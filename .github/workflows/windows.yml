name: Windows

on: [push, pull_request, workflow_dispatch] # workflow_dispatch ti permette di farlo partire a mano

jobs:
  msbuild:
    runs-on: windows-2022
    strategy:
      matrix:
        configuration: [Release]
    steps:
      - uses: actions/checkout@v4
      
      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build
        shell: cmd
        run: msbuild Osiris.sln /p:Platform=x64 /p:Configuration=${{ matrix.configuration }}

      - name: Upload Osiris DLL
        uses: actions/upload-artifact@v4
        with:
          name: Osiris-Release
          path: |
            build/x64/Release/Osiris.dll
            bin/x64/Release/Osiris.dll
            x64/Release/Osiris.dll
